<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PeakHer: Your Performance Dashboard</title>
<meta name="description" content="Track your energy, confidence, and cycle-based patterns. Discover your peak performance rhythm.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  :root {
    /* Dark-mode-first palette (Oura/Whoop inspired) */
    --bg-primary: #12121A;
    --bg-surface: #1A1A26;
    --bg-elevated: #22222F;
    --bg-card: #1E1E2A;
    --navy: #12121A;
    --navy-light: #1A1A26;
    --black: #000000;
    --white: #ffffff;
    --coral: #E87461;
    --coral-hover: #d4634f;
    --teal: #00E5A0;
    --teal-hover: #00CC8E;
    --gray-mid: #6B6B7B;
    --gray-text: #9393A3;
    --text-primary: #F0F0F5;
    --text-secondary: #A0A0B0;
    /* Phase colors from mockups */
    --reflect: #C77DBA;
    --build: #00E5A0;
    --perform: #FFD700;
    --complete: #FF6B8A;
    --phase-restore: #C77DBA;
    --phase-rise: #00E5A0;
    --phase-peak: #FFD700;
    --phase-sustain: #8B7BDB;
    --phase-accent: #00E5A0;
    --bottom-nav-height: 72px;
    --cream: #12121A;
    --warm-gray: #22222F;
    --coral-soft: rgba(232,116,97,0.12);
    --teal-soft: rgba(0,229,160,0.12);
    --gray-text-light: #6B6B7B;
    --text-dark: #F0F0F5;
    --text-body: #C0C0D0;
    --border-light: rgba(255,255,255,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
    min-height: 100dvh;
  }

  h1, h2, h3, .section-title, .briefing-headline {
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
  }

  /* ---- TOP NAV ---- */
  .app-top-nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 56px;
    background: rgba(18, 18, 26, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-light);
    padding-top: env(safe-area-inset-top);
  }
  .app-top-nav .logo {
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--teal);
    text-decoration: none;
  }
  .app-top-nav .nav-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .app-top-nav .nav-right a {
    font-size: 13px;
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.2s;
  }
  .app-top-nav .nav-right a:hover { color: var(--teal); }

  /* ---- BOTTOM TAB NAV ---- */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: stretch;
    justify-content: space-around;
    height: var(--bottom-nav-height);
    background: rgba(18, 18, 26, 0.95);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--border-light);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .bottom-nav.hidden { display: none; }
  .tab-link {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    text-decoration: none;
    color: var(--gray-mid);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3px;
    transition: color 0.2s;
    min-height: 44px;
    padding: 8px 4px;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-link.active { color: var(--phase-accent, var(--teal)); }
  .tab-link:hover { color: var(--teal); }
  .tab-link svg {
    width: 22px;
    height: 22px;
    stroke-width: 1.8;
  }

  /* ---- SCREEN SYSTEM ---- */
  .app-content {
    padding-top: 56px;
    padding-bottom: var(--bottom-nav-height);
    min-height: 100vh;
    min-height: 100dvh;
  }
  .screen {
    display: none;
    flex-direction: column;
    min-height: calc(100vh - 56px - var(--bottom-nav-height));
    min-height: calc(100dvh - 56px - var(--bottom-nav-height));
    padding: 24px 16px 40px;
    opacity: 0;
    transform: translateX(30px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .screen.active {
    display: flex;
    opacity: 1;
    transform: translateX(0);
  }

  /* ---- SHARED COMPONENTS ---- */

  /* Buttons */
  .btn-primary {
    background: var(--teal);
    color: var(--bg-primary);
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    width: 100%;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    min-height: 44px;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 16px rgba(0,229,160,0.25);
  }
  .btn-primary:hover { background: var(--teal-hover); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-secondary {
    background: var(--bg-elevated);
    color: var(--text-primary);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    width: 100%;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    min-height: 44px;
  }
  .btn-secondary:hover {
    background: var(--bg-surface);
    border-color: rgba(255,255,255,0.1);
  }

  .btn-text {
    background: none;
    border: none;
    color: var(--teal);
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    padding: 8px;
    min-height: 44px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-text:hover { text-decoration: underline; }

  /* Inputs */
  .input-field {
    background: var(--bg-elevated);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    color: var(--text-primary);
    padding: 14px 16px;
    font-size: 16px;
    font-family: inherit;
    width: 100%;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-height: 44px;
  }
  .input-field:focus {
    border-color: var(--teal);
    outline: none;
    box-shadow: 0 0 0 3px rgba(0,229,160,0.15);
  }
  .input-field::placeholder { color: var(--gray-mid); }

  textarea.input-field {
    resize: vertical;
    line-height: 1.5;
  }

  /* Range Sliders */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right, var(--phase-restore), var(--phase-rise), var(--phase-peak), var(--phase-sustain));
    outline: none;
    opacity: 0.85;
    transition: opacity 0.2s;
    margin: 8px 0;
  }
  input[type="range"]:hover { opacity: 1; }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: white;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  input[type="range"]::-moz-range-thumb {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: white;
    cursor: pointer;
    border: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  /* Cards */
  .card {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 16px;
    border: 1px solid var(--border-light);
    box-shadow: none;
  }

  /* Badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }
  .badge-teal { background: var(--teal-soft); color: var(--teal); }
  .badge-coral { background: var(--coral-soft); color: var(--coral); }
  .badge-reflect { background: rgba(199,125,186,0.15); color: var(--phase-restore); }
  .badge-build { background: rgba(0,229,160,0.12); color: var(--phase-rise); }
  .badge-perform { background: rgba(255,215,0,0.12); color: var(--phase-peak); }
  .badge-complete { background: rgba(139,123,219,0.15); color: var(--phase-sustain); }

  /* Progress Bar */
  .progress-bar {
    width: 100%;
    height: 6px;
    background: var(--bg-elevated);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(to right, var(--phase-rise), var(--teal));
    transition: width 0.5s ease;
  }

  /* Toggle Switch */
  .toggle-container {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .toggle-track {
    width: 48px;
    height: 28px;
    border-radius: 14px;
    background: var(--bg-elevated);
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-track.active { background: var(--teal); }
  .toggle-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: white;
    transition: transform 0.2s;
  }
  .toggle-track.active .toggle-thumb { transform: translateX(20px); }

  /* Pill Toggle Group */
  .pill-group {
    display: flex;
    background: var(--bg-surface);
    border-radius: 10px;
    padding: 3px;
    gap: 2px;
  }
  .pill-option {
    flex: 1;
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    background: none;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    min-height: 36px;
  }
  .pill-option.active {
    background: var(--teal);
    color: var(--bg-primary);
  }

  /* Section headings */
  .section-title {
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 4px;
    color: var(--text-primary);
  }
  .section-subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 24px;
  }

  /* Onboarding steps */
  .onboarding-step {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 400px;
    margin: 0 auto;
    opacity: 0;
    transform: translateX(30px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .onboarding-step.active {
    display: flex;
    opacity: 1;
    transform: translateX(0);
  }

  /* Progress dots */
  .progress-dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 32px;
  }
  .progress-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--bg-elevated);
    transition: background 0.3s, transform 0.3s;
  }
  .progress-dot.active { background: var(--teal); transform: scale(1.2); }
  .progress-dot.completed { background: var(--teal); }

  /* Hat selection grid */
  .hat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    margin-bottom: 24px;
  }
  .hat-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px 8px;
    background: var(--bg-card);
    border: 2px solid var(--border-light);
    border-radius: 16px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    min-height: 90px;
    -webkit-tap-highlight-color: transparent;
  }
  .hat-tile .hat-emoji { font-size: 28px; }
  .hat-tile .hat-label { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .hat-tile.selected {
    border-color: var(--teal);
    background: rgba(0,229,160,0.08);
  }

  /* Check-in specific */
  .slider-group { margin-bottom: 28px; }
  .slider-label {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text-primary);
  }
  .slider-value {
    font-size: 48px;
    font-weight: 700;
    text-align: center;
    line-height: 1;
    margin-bottom: 4px;
    color: var(--text-primary);
  }
  .slider-endpoints {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--gray-mid);
    margin-top: 4px;
  }

  /* Expandable section */
  .expandable {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.4s ease;
  }
  .expandable.open { max-height: 600px; }
  .expand-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--teal);
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    padding: 12px 0;
    -webkit-tap-highlight-color: transparent;
  }
  .expand-toggle svg {
    transition: transform 0.3s;
  }
  .expand-toggle.open svg {
    transform: rotate(180deg);
  }

  /* Post-submit animation */
  @keyframes checkmark-pop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .checkmark-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--teal);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    animation: checkmark-pop 0.5s ease forwards;
  }
  .checkmark-circle svg {
    width: 40px;
    height: 40px;
    stroke: var(--bg-primary);
    stroke-width: 3;
  }

  /* Calendar */
  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .calendar-header .month-label {
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .calendar-nav-btn {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    color: var(--text-primary);
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .calendar-nav-btn:hover { background: var(--bg-elevated); }
  .calendar-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .calendar-day-header {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--gray-mid);
    padding: 8px 0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .calendar-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
    gap: 3px;
  }
  .calendar-day:hover { background: var(--bg-elevated); }
  .calendar-day.today {
    outline: 2px solid var(--teal);
    outline-offset: -2px;
  }
  .calendar-day.future { opacity: 0.3; pointer-events: none; }
  .calendar-day.empty { pointer-events: none; }
  .calendar-day .day-num {
    font-size: 13px;
    color: var(--text-secondary);
  }
  .calendar-day.has-checkin .day-num { color: var(--text-primary); }
  .calendar-day .day-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Day detail panel (bottom sheet) */
  .day-detail-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 500;
    opacity: 0;
    transition: opacity 0.3s;
    display: none;
  }
  .day-detail-overlay.active {
    display: block;
    opacity: 1;
  }
  .day-detail-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px calc(24px + var(--bottom-nav-height));
    z-index: 501;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    max-height: 70vh;
    overflow-y: auto;
  }
  .day-detail-panel.active { transform: translateY(0); }
  .day-detail-panel .handle {
    width: 40px;
    height: 4px;
    background: var(--bg-elevated);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .metrics-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 16px 0;
  }
  .metric-card {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 14px 16px;
  }
  .metric-card .metric-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .metric-card .metric-value {
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--text-primary);
  }
  .metric-card .metric-bar {
    height: 4px;
    border-radius: 2px;
    background: var(--bg-elevated);
    margin-top: 8px;
    overflow: hidden;
  }
  .metric-card .metric-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Pattern cards */
  .pattern-card {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid var(--border-light);
    border-left: 4px solid var(--teal);
    position: relative;
  }
  .pattern-card.negative { border-left-color: var(--coral); }
  .pattern-card .pattern-type {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--teal);
    margin-bottom: 6px;
  }
  .pattern-card .pattern-desc {
    font-size: 15px;
    line-height: 1.4;
    margin-bottom: 8px;
    color: var(--text-primary);
  }
  .pattern-card .pattern-meta {
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* Week ahead cards */
  .weekahead-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 16px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .weekahead-scroll::-webkit-scrollbar { display: none; }
  .weekahead-card {
    flex-shrink: 0;
    width: 140px;
    background: var(--bg-card);
    border-radius: 16px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.2s;
    border: 2px solid var(--border-light);
    -webkit-tap-highlight-color: transparent;
  }
  .weekahead-card.best-day {
    border-color: var(--teal);
    box-shadow: 0 0 20px rgba(0,229,160,0.12);
  }
  .weekahead-card .wa-day {
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 2px;
    color: var(--text-primary);
  }
  .weekahead-card .wa-date {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .wa-bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .wa-bar {
    flex: 1;
    height: 6px;
    background: var(--bg-elevated);
    border-radius: 3px;
    overflow: hidden;
  }
  .wa-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .wa-bar-fill.energy { background: var(--teal); }
  .wa-bar-fill.confidence { background: var(--phase-sustain); }
  .wa-bar-value {
    font-size: 14px;
    font-weight: 700;
    width: 20px;
    text-align: right;
    color: var(--text-primary);
  }

  /* Signal badges */
  .signal-badge {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 700;
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .signal-high-energy { background: var(--teal-soft); color: var(--teal); }
  .signal-rest { background: var(--coral-soft); color: var(--coral); }
  .signal-great { background: rgba(139,123,219,0.15); color: var(--phase-sustain); }

  /* Chart containers */
  .chart-container {
    position: relative;
    width: 100%;
    height: 200px;
    margin: 16px 0;
  }
  .chart-container canvas {
    width: 100% !important;
    height: 100% !important;
  }

  /* Lock/pre-activation state */
  .locked-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 20px;
    flex: 1;
  }
  .lock-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--bg-elevated);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }
  .lock-icon svg { width: 28px; height: 28px; stroke: var(--gray-mid); }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 20px;
    flex: 1;
  }
  .empty-state p {
    color: var(--text-secondary);
    margin-bottom: 20px;
  }

  /* Streak display */
  .streak-display {
    text-align: center;
    margin-bottom: 16px;
  }
  .streak-number {
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: var(--teal);
  }
  .streak-label {
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* Detail expand on weekahead cards */
  .wa-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .wa-detail.open { max-height: 200px; }
  .wa-detail-content {
    padding-top: 12px;
    border-top: 1px solid var(--border-light);
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* Responsive */
  @media (max-width: 380px) {
    .hat-grid { grid-template-columns: repeat(2, 1fr); }
    .weekahead-card { width: 120px; padding: 12px; }
    .slider-value { font-size: 40px; }
  }
  @media (min-width: 600px) {
    .screen { padding: 32px 40px 48px; max-width: 600px; margin: 0 auto; }
  }
  @media (min-width: 768px) {
    .screen { max-width: 700px; }
  }
  @media (min-width: 900px) {
    .screen { max-width: 800px; }
  }

  /* ---- DAILY BRIEFING ---- */
  .briefing-card {
    background: var(--bg-card);
    border-radius: 16px;
    border: 1px solid var(--border-light);
    box-shadow: none;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .briefing-phase-bar {
    height: 4px;
  }
  .briefing-header {
    padding: 20px 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .briefing-phase-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .briefing-cycle-day {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .briefing-headline {
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 800;
    padding: 12px 20px 0;
    line-height: 1.3;
    color: var(--text-primary);
  }
  .briefing-summary {
    font-size: 15px;
    color: var(--text-secondary);
    padding: 8px 20px 16px;
    line-height: 1.6;
  }
  .briefing-sections {
    border-top: 1px solid var(--border-light);
  }
  .briefing-section {
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .briefing-section:last-child {
    border-bottom: none;
  }
  .briefing-section-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    width: 100%;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    cursor: pointer;
    text-align: left;
    -webkit-tap-highlight-color: transparent;
  }
  .briefing-section-toggle .section-icon {
    font-size: 18px;
    width: 24px;
    text-align: center;
  }
  .briefing-section-toggle .section-arrow {
    margin-left: auto;
    transition: transform 0.2s;
    color: var(--gray-mid);
    font-size: 12px;
  }
  .briefing-section-toggle.open .section-arrow {
    transform: rotate(180deg);
  }
  .briefing-section-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .briefing-section-body.open {
    max-height: 600px;
  }
  .briefing-section-content {
    padding: 0 20px 16px 54px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-body);
  }
  .briefing-do-skip {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }
  .briefing-do, .briefing-skip {
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.4;
  }
  .briefing-do {
    background: rgba(0,229,160,0.1);
    color: var(--teal);
  }
  .briefing-skip {
    background: rgba(232,116,97,0.1);
    color: var(--coral);
  }
  .briefing-do strong, .briefing-skip strong {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .briefing-funfact {
    padding: 14px 20px;
    background: rgba(255,255,255,0.02);
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
    border-top: 1px solid var(--border-light);
  }
  .briefing-funfact strong {
    color: var(--text-primary);
  }
  /* v2: Key Insight section */
  .briefing-key-insight {
    padding: 16px 20px;
    background: linear-gradient(135deg, rgba(0,229,160,0.06) 0%, rgba(0,229,160,0.02) 100%);
    border-top: 1px solid rgba(0,229,160,0.12);
    border-bottom: 1px solid var(--border-light);
  }
  .briefing-key-insight-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--teal);
    margin-bottom: 6px;
  }
  .briefing-key-insight-text {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.5;
    color: var(--text-primary);
  }

  .briefing-streak {
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    color: var(--teal);
    border-top: 1px solid var(--border-light);
  }
  @media (max-width: 380px) {
    .briefing-headline { font-size: 19px; }
    .briefing-do-skip { grid-template-columns: 1fr; }
    .briefing-section-content { padding-left: 44px; }
  }

  /* ---- PHASE-ADAPTIVE ACCENT COLORS ---- */
  body.phase-restore { --phase-accent: #C77DBA; }
  body.phase-rise    { --phase-accent: #00E5A0; }
  body.phase-peak    { --phase-accent: #FFD700; }
  body.phase-sustain { --phase-accent: #8B7BDB; }

  /* ---- LIGHT MODE ---- */
  body.light-mode {
    --bg-primary: #F7F6F3;
    --bg-surface: #FFFFFF;
    --bg-elevated: #FFFFFF;
    --bg-card: #FFFFFF;
    --navy: #F7F6F3;
    --navy-light: #FFFFFF;
    --text-primary: #1A1A2E;
    --text-secondary: #666666;
    --text-body: #444444;
    --text-dark: #1A1A2E;
    --gray-mid: #999999;
    --gray-text: #888888;
    --gray-text-light: #999999;
    --border-light: rgba(0,0,0,0.08);
    --cream: #F7F6F3;
    --warm-gray: #F0EDE8;
    --coral-soft: rgba(232,116,97,0.08);
    --teal-soft: rgba(0,229,160,0.08);
  }
  body.light-mode .card,
  body.light-mode .briefing-card,
  body.light-mode .ph-bento-card {
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border-color: rgba(0,0,0,0.06);
  }
  body.light-mode .app-top-nav {
    background: rgba(247,246,243,0.92);
    border-bottom-color: rgba(0,0,0,0.06);
  }
  body.light-mode .bottom-nav {
    background: rgba(247,246,243,0.95);
    border-top-color: rgba(0,0,0,0.06);
  }
  body.light-mode .ph-phase-circle-bg {
    opacity: 0.15;
  }
  body.light-mode input[type="range"] {
    opacity: 1;
  }

  /* ---- PHASE CIRCLE ---- */
  .ph-phase-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0 24px;
  }
  .ph-phase-ring-wrap {
    position: relative;
    width: 200px;
    height: 200px;
    margin-bottom: 8px;
  }
  .ph-phase-ring-wrap svg {
    width: 100%;
    height: 100%;
  }
  .ph-phase-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .ph-phase-day-num {
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    font-size: 42px;
    font-weight: 800;
    line-height: 1;
    color: var(--text-primary);
  }
  .ph-phase-day-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .ph-phase-name {
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--phase-accent, var(--teal));
    margin-top: 4px;
  }
  .ph-phase-remaining {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  /* ---- BENTO GRID ---- */
  .ph-bento-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .ph-bento-card {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 16px;
    border: 1px solid var(--border-light);
    min-height: 90px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .ph-bento-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .ph-bento-value {
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1;
  }
  .ph-bento-detail {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
    line-height: 1.4;
  }
  .ph-bento-score-ring {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .ph-bento-score-ring svg {
    flex-shrink: 0;
  }

  /* ---- PHASE INSIGHT CARD ---- */
  .ph-phase-insight {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 16px 18px;
    border: 1px solid var(--border-light);
    margin-bottom: 24px;
  }
  .ph-phase-insight-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--phase-accent, var(--teal));
    margin-bottom: 8px;
  }
  .ph-phase-insight-text {
    font-size: 14px;
    color: var(--text-body);
    line-height: 1.6;
  }

  /* v3: Structured briefing sections */
  .briefing-v3-section {
    padding: 16px 20px;
    border-top: 1px solid var(--border-light);
  }
  .briefing-v3-section-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 10px;
  }
  .briefing-v3-text {
    font-size: 14px;
    color: var(--text-body);
    line-height: 1.6;
    margin-bottom: 10px;
  }
  .briefing-meeting-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .briefing-meeting-card:last-child {
    margin-bottom: 0;
  }
  @media (max-width: 380px) {
    .briefing-v3-section { padding: 12px 16px; }
  }
</style>
</head>

<!-- Global Helpers -->
<script>
window.PeakHer = window.PeakHer || {};

// Theme toggle (light/dark)
window.PeakHer.toggleTheme = function() {
  var isLight = document.body.classList.toggle('light-mode');
  localStorage.setItem('peakher_theme', isLight ? 'light' : 'dark');
  return isLight ? 'light' : 'dark';
};
window.PeakHer.setTheme = function(mode) {
  if (mode === 'light') {
    document.body.classList.add('light-mode');
  } else {
    document.body.classList.remove('light-mode');
  }
  localStorage.setItem('peakher_theme', mode);
};
window.PeakHer.getTheme = function() {
  return localStorage.getItem('peakher_theme') || 'dark';
};

// Phase accent color on body
window.PeakHer.applyPhaseAccent = function() {
  var Store = window.PeakHer.Store;
  var Cycle = window.PeakHer.Cycle;
  if (!Store || !Cycle) return;
  var profile = Store.getCycleProfile();
  if (!profile || !profile.trackingEnabled) return;
  var day = Cycle.getCycleDay(profile.lastPeriodStart, profile.averageCycleLength, new Date());
  var phase = Cycle.getPhase(day, profile.averageCycleLength);
  var mode = Cycle.getPerformanceMode(phase);
  document.body.classList.remove('phase-restore','phase-rise','phase-peak','phase-sustain');
  document.body.classList.add('phase-' + mode.toLowerCase());
};
</script>

<!-- App Init -->
<script>
(function() {
  function safeInit(name, fn) {
    try { fn(); } catch (e) { console.error('PeakHer.' + name + '.init() failed:', e); }
  }

  document.addEventListener('DOMContentLoaded', function() {
    safeInit('Onboarding', function() { PeakHer.Onboarding.init(); });
    safeInit('Checkin', function() { PeakHer.Checkin.init(); });
    safeInit('Briefing', function() { PeakHer.Briefing.init(); });
    safeInit('History', function() { PeakHer.History.init(); });
    safeInit('Patterns', function() { PeakHer.Patterns.init(); });
    safeInit('WeekAhead', function() { PeakHer.WeekAhead.init(); });
    safeInit('Settings', function() { PeakHer.Settings.init(); });
    safeInit('Router', function() { PeakHer.Router.init(); });

    // Sync with server if logged in
    if (PeakHer.API.isLoggedIn()) {
      PeakHer.API.fullSync();
    }

    // Initialize push notifications if logged in
    if (PeakHer.API.isLoggedIn()) {
      PeakHer.API.initPushNotifications();
    }

    // Show login/account button based on auth state
    if (PeakHer.API.isLoggedIn()) {
      var loginBtn = document.getElementById('loginBtn');
      var accountBtn = document.getElementById('accountBtn');
      if (loginBtn) loginBtn.style.display = 'none';
      if (accountBtn) accountBtn.style.display = 'inline-flex';
    }

    // Apply saved theme
    var savedTheme = localStorage.getItem('peakher_theme');
    if (savedTheme === 'light') document.body.classList.add('light-mode');

    // Apply phase accent color
    PeakHer.applyPhaseAccent();
  });
})();
</script>
